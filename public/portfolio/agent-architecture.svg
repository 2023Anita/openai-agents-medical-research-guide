<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Medical research agent architecture</title>
  <desc id="desc">Architecture diagram for the medical research assistant course project.</desc>
  <rect width="1440" height="900" fill="#F7FAF9"/>
  <text x="96" y="128" fill="#238676" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">SYSTEM MAP</text>
  <text x="96" y="198" fill="#15211F" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="800">One agent project, seven SDK concepts.</text>
  <text x="98" y="252" fill="#536762" font-family="Inter, Arial, sans-serif" font-size="26">The course turns abstract SDK vocabulary into a visible medical research workflow.</text>
  <rect x="96" y="360" width="232" height="112" rx="8" fill="#FFFFFF" stroke="#D8E4E1" stroke-width="2"/>
