  <text x="882" y="477" fill="#15211F" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">Statistics</text>
  <rect x="842" y="544" width="220" height="92" rx="8" fill="#FFFFFF" stroke="#D8E4E1" stroke-width="2"/>
  <text x="882" y="599" fill="#15211F" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">Writing</text>
