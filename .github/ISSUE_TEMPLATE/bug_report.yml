name: Bug report
description: Report a site, docs, or demo-code bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include API keys, patient data, or private medical information.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Page or file
      description: Link the page or file where the issue appears.
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the shortest steps that reproduce the issue.
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, device, Node version, or Python version if relevant.
